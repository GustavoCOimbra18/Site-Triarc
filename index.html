    <!-- Service Worker Registration -->
    <script>
      try {
        if ('serviceWorker' in navigator) {
          // Avoid registering the service worker on localhost or dev preview domains to prevent sandbox/caching issues
          const isDevPreview = window.location.hostname.includes('localhost') || 
                               window.location.hostname.includes('127.0.0.1') || 
                               window.location.hostname.includes('run.app') || 
                               window.location.hostname.includes('aistudio');
          
          if (!isDevPreview) {
            window.addEventListener('load', () => {
              try {
                navigator.serviceWorker.register('/sw.js')
                  .then((reg) => console.log('TRIARC PWA Service Worker registrado com sucesso:', reg.scope))
                  .catch((err) => console.warn('Erro ao registrar Service Worker:', err));
              } catch (innerErr) {
                console.warn('Falha ao tentar registrar sw:', innerErr);
              }
            });
          } else {
            console.log('TRIARC PWA Service Worker skipped in dev/preview environment.');
            // Unregister any active Service Workers on dev/preview to prevent aggressive caching of old blank pages
            navigator.serviceWorker.getRegistrations().then(async (registrations) => {
              let unregisteredAny = false;
              for (const registration of registrations) {
                const success = await registration.unregister();
                if (success) {
                  console.log('Unregistered stale service worker in dev preview.');
                  unregisteredAny = true;
                }
              }
              if (unregisteredAny && 'caches' in window) {
                const keys = await caches.keys();
                await Promise.all(keys.map(key => caches.delete(key)));
                console.log('Caches cleared for dev preview. Reloading...');
                window.location.reload();
              }
            }).catch(err => console.warn('Error fetching service worker registrations:', err));
          }
        }
      } catch (err) {
        console.warn('Erro geral de Service Worker:', err);
      }
    </script>
